name: Release Expert
on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@8bb7a2ed0f90c9802c83129a9488d235a1f31a7c
        id: release

  draft:
    name: draft
    needs: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    if: ${{ needs.release.outputs.release_created }}
    steps:
      - env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=true --repo='elixir-lang/expert'

  build:
    needs: [release, draft]
    runs-on: macos-14
    permissions:
      contents: write
    if: ${{ needs.release.outputs.release_created }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: "27.3.4.1"
          elixir-version: "1.17.3"
          version-type: strict
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.15.2"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - env:
          MIX_ENV: prod
        run: just burrito
      - name: Create Checksum
        run: |
          cd ./apps/expert/burrito_out
          chmod +x ./*
          shasum -a 256 ./* > expert_checksums.txt
          cd ../../../
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" ./apps/expert/burrito_out/*

  publish:
    name: publish
    needs: [release, draft, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=false --repo='elixir-lang/expert'
