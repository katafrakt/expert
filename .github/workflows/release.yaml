name: Release Expert
on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release

  draft:
    name: draft
    needs: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    if: ${{ needs.release.outputs.release_created }}
    steps:
      - env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=true --repo='expert-lsp/expert'

  build:
    needs: [release, draft]
    runs-on: macos-14
    permissions:
      contents: write
    if: ${{ needs.release.outputs.release_created }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: "27.3.4.1"
          elixir-version: "1.17.3"
          version-type: strict
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.15.2"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - env:
          MIX_ENV: prod
        run: just burrito
      - name: Create Checksum
        run: |
          cd ./apps/expert/burrito_out
          chmod +x ./*
          shasum -a 256 ./* > expert_checksums.txt
          cd ../../../
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" ./apps/expert/burrito_out/*

  publish:
    name: publish
    needs: [release, draft, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ needs.release.outputs.release_created }}
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ needs.release.outputs.release_created }}
        with:
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Create release branch
        shell: bash
        if: ${{ needs.release.outputs.release_created }}
        env:
          BRANCH: v${{ needs.release.outputs.major }}.${{  needs.release.outputs.minor }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

      - name: Create backport label
        shell: bash
        if: ${{ needs.release.outputs.release_created }}
        env:
          LABEL: v${{ needs.release.outputs.major }}.${{  needs.release.outputs.minor }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh label create "release:backport $LABEL"

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=false --repo='expert-lsp/expert'
